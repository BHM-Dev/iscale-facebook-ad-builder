name: CI - Pre-Deploy Checks

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-import:
    name: Backend imports & boots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app.main imports
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_check
          SECRET_KEY: ci-import-check-secret-not-used-at-runtime
        run: |
          python -c "from app.main import app; print('OK:', app.title)"

  alembic-heads:
    name: Single Alembic head
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Assert exactly one Alembic head
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_check
          SECRET_KEY: ci-import-check-secret-not-used-at-runtime
        run: |
          HEADS_OUTPUT=$(alembic heads)
          echo "alembic heads output:"
          echo "$HEADS_OUTPUT"
          HEAD_COUNT=$(echo "$HEADS_OUTPUT" | grep -c "(head)" || true)
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "::error::Expected exactly 1 Alembic head, found $HEAD_COUNT. Multiple heads must be merged with 'alembic merge'."
            exit 1
          fi
          echo "OK: single migration head"

  alembic-migrate:
    name: Migrations apply & server boots
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: migrate_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migrate_check
          SECRET_KEY: ci-import-check-secret-not-used-at-runtime
        run: alembic upgrade head

      - name: alembic downgrade -1 then upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migrate_check
          SECRET_KEY: ci-import-check-secret-not-used-at-runtime
        run: |
          alembic downgrade -1
          alembic upgrade head

      - name: Smoke-boot uvicorn (binds, connects to DB, responds)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migrate_check
          SECRET_KEY: ci-import-check-secret-not-used-at-runtime
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          UVICORN_PID=$!
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/api/v1/openapi.json > /dev/null 2>&1; then
              echo "OK: server responded on attempt $i"
              kill $UVICORN_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "::error::uvicorn failed to respond within 20s"
          echo "--- uvicorn.log ---"
          cat uvicorn.log
          kill $UVICORN_PID 2>/dev/null || true
          exit 1

  frontend-build:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
