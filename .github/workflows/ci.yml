name: CI - Pre-Deploy Checks

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-import:
    name: Backend imports cleanly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify app.main imports
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_check
          SECRET_KEY: ci-import-check-secret-not-used-at-runtime
        run: |
          python -c "from app.main import app; print('OK:', app.title)"

  alembic-heads:
    name: Single Alembic head
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Assert exactly one Alembic head
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_check
          SECRET_KEY: ci-import-check-secret-not-used-at-runtime
        run: |
          HEADS_OUTPUT=$(alembic heads)
          echo "alembic heads output:"
          echo "$HEADS_OUTPUT"
          HEAD_COUNT=$(echo "$HEADS_OUTPUT" | grep -c "(head)" || true)
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "::error::Expected exactly 1 Alembic head, found $HEAD_COUNT. Multiple heads must be merged with 'alembic merge'."
            exit 1
          fi
          echo "OK: single migration head"

  frontend-build:
    name: Frontend builds cleanly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
